# =============================================================================
# Mazak VQC 20/40 — LinuxCNC INI File
# Hardware: 7i97T (Ethernet host) + 7i49 (resolver interface, pending)
# OS: Debian Trixie, PREEMPT_RT kernel, XFCE/X11
# Updated: 2026-06-21 — all axes use Mitsubishi RT-5XA resolvers via 7i49
#
# Motors:
#   X: Mitsubishi HD81-12S-TT-A + RT-5XA resolver
#   Y: Mitsubishi HD81-12S-TT-A + RT-5XA resolver
#   Z: Mitsubishi HD101-12-TT-A + RT-5XA resolver + N1J-L2-201 brake
# =============================================================================

[EMC]
MACHINE                 = Mazak_VQC_2040
DEBUG                   = 0

[KINS]
KINEMATICS              = trivkins coordinates=XYZ
JOINTS                  = 3

[DISPLAY]
DISPLAY                 = axis
CYCLE_TIME              = 0.100
POSITION_OFFSET         = RELATIVE
POSITION_FEEDBACK       = ACTUAL
MAX_FEED_OVERRIDE       = 1.5
MAX_SPINDLE_OVERRIDE    = 1.5
MIN_SPINDLE_OVERRIDE    = 0.5
DEFAULT_LINEAR_VELOCITY = 1.0
MAX_LINEAR_VELOCITY     = 5.0
INTRO_GRAPHIC           = linuxcnc.gif
INTRO_TIME              = 2
INCREMENTS              = 1 0.1 0.01 0.001

[FILTER]
PROGRAM_EXTENSION       = .ngc,.nc,.tap G-Code Files

[RS274NGC]
PARAMETER_FILE          = mazak.var
SUBROUTINE_PATH         = subroutines

[EMCMOT]
EMCMOT               = motmod
COMM_TIMEOUT         = 1.0
SERVO_PERIOD         = 1000000

[HAL]
HALFILE                 = mazak.hal
POSTGUI_HALFILE         = postgui.hal
# NOTE: postgui.hal must exist or LinuxCNC will fail to start. A stub is provided.
#       Add halui/pyvcp/gladevcp signal connections here once the GUI is configured.

# =============================================================================
# TRAJ
# =============================================================================
[TRAJ]
COORDINATES             = X Y Z
LINEAR_UNITS            = inch
ANGULAR_UNITS           = degree
DEFAULT_LINEAR_VELOCITY = 1.0
MAX_LINEAR_VELOCITY     = 5.0
DEFAULT_LINEAR_ACCELERATION = 10.0
MAX_LINEAR_ACCELERATION     = 20.0

# =============================================================================
# AXIS X
# =============================================================================
[AXIS_X]
MIN_LIMIT               = -20.0
MAX_LIMIT               =  20.0
MAX_VELOCITY            =  5.0
MAX_ACCELERATION        = 10.0

[JOINT_0]
TYPE                    = LINEAR
HOME                    = 0.0
MIN_LIMIT               = -20.0
MAX_LIMIT               =  20.0
MAX_VELOCITY            =  5.0
MAX_ACCELERATION        = 10.0
FERROR                  = 0.050
MIN_FERROR              = 0.010
# TODO: SCALE = 7i49 counts/rev / ballscrew pitch (inch)
# 7i49 = 65536 counts/rev. Example 5mm pitch (0.19685"): 65536/0.19685 = 332893
# Confirm actual ballscrew pitch from machine drawings
SCALE                   = 332893
HOME_SEARCH_VEL         = 0.2
HOME_LATCH_VEL          = 0.05
HOME_USE_INDEX          = YES
HOME_IGNORE_LIMITS      = YES
HOME_SEQUENCE           = 1
HOME_OFFSET             = 0.0
P                       = 50
I                       = 0
D                       = 0
FF0                     = 0
FF1                     = 1.0
FF2                     = 0
BIAS                    = 0
MAX_OUTPUT              = 9.5
DEADBAND                = 0.0005

# =============================================================================
# AXIS Y
# =============================================================================
[AXIS_Y]
MIN_LIMIT               = -20.0
MAX_LIMIT               =  20.0
MAX_VELOCITY            =  5.0
MAX_ACCELERATION        = 10.0

[JOINT_1]
TYPE                    = LINEAR
HOME                    = 0.0
MIN_LIMIT               = -20.0
MAX_LIMIT               =  20.0
MAX_VELOCITY            =  5.0
MAX_ACCELERATION        = 10.0
FERROR                  = 0.050
MIN_FERROR              = 0.010
# TODO: same scale calculation — confirm ballscrew pitch
SCALE                   = 332893
HOME_SEARCH_VEL         = 0.2
HOME_LATCH_VEL          = 0.05
HOME_USE_INDEX          = YES
HOME_IGNORE_LIMITS      = YES
HOME_SEQUENCE           = 3
HOME_OFFSET             = 0.0
P                       = 50
I                       = 0
D                       = 0
FF0                     = 0
FF1                     = 1.0
FF2                     = 0
BIAS                    = 0
MAX_OUTPUT              = 9.5
DEADBAND                = 0.0005

# =============================================================================
# AXIS Z
# NOTE: Z has brake unit N1J-L2-201 — must be wired through 7i84U output
# =============================================================================
[AXIS_Z]
MIN_LIMIT               = -20.0
MAX_LIMIT               =  1.0
MAX_VELOCITY            =  5.0
MAX_ACCELERATION        = 10.0

[JOINT_2]
TYPE                    = LINEAR
HOME                    = 0.0
MIN_LIMIT               = -20.0
MAX_LIMIT               =  1.0
MAX_VELOCITY            =  5.0
MAX_ACCELERATION        = 10.0
FERROR                  = 0.050
MIN_FERROR              = 0.010
# TODO: same scale calculation — confirm ballscrew pitch
SCALE                   = 332893
HOME_SEARCH_VEL         = 0.2
HOME_LATCH_VEL          = 0.05
HOME_USE_INDEX          = YES
HOME_IGNORE_LIMITS      = YES
HOME_SEQUENCE           = 2
HOME_OFFSET             = 0.0
P                       = 50
I                       = 0
D                       = 0
FF0                     = 0
FF1                     = 1.0
FF2                     = 0
BIAS                    = 0
MAX_OUTPUT              = 9.5
DEADBAND                = 0.0005

# =============================================================================
# SPINDLE
# =============================================================================
[SPINDLE_0]
MAX_FORWARD_VELOCITY    = 4000
MIN_FORWARD_VELOCITY    = 0
MAX_REVERSE_VELOCITY    = -4000
MIN_REVERSE_VELOCITY    = 0
MAX_ACCELERATION        = 200.0
INCREMENT               = 200

# =============================================================================
# EMCIO
# =============================================================================
[EMCIO]
EMCIO                   = iov2
CYCLE_TIME              = 0.100
TOOL_TABLE              = tool.tbl
