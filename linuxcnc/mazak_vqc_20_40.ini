[EMC]
MACHINE = Mazak VQC 20/40 Mesa Retrofit
DEBUG = 0
VERSION = 1.1

[DISPLAY]
DISPLAY = axis
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.2
MAX_SPINDLE_OVERRIDE = 1.2
MIN_SPINDLE_OVERRIDE = 0.5
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 3
PROGRAM_PREFIX = ~/linuxcnc/nc_files
INCREMENTS = 0.0001in 0.001in 0.01in 0.1in

[KINS]
KINEMATICS = trivkins coordinates=XYZ
JOINTS = 3

[TRAJ]
COORDINATES = X Y Z
LINEAR_UNITS = inch
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 1.0
MAX_LINEAR_VELOCITY = 5.0

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 0
SERVO_PERIOD = 1000000

[HAL]
HALFILE = mazak_vqc_20_40.hal
HALFILE = motion_7i77.hal
HALFILE = field_7i84.hal
# Optional after pendant driver is installed and tested:
# HALFILE = pendant_whb04b.hal
POSTGUI_HALFILE = postgui.hal
HALUI = halui

[HALUI]
MDI_COMMAND = G53 G0 Z0

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl
TOOL_CHANGE_POSITION = 0 0 0
TOOL_CHANGE_QUILL_UP = 1

[RS274NGC]
PARAMETER_FILE = linuxcnc.var

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[AXIS_X]
MIN_LIMIT = -999.0
MAX_LIMIT = 999.0
MAX_VELOCITY = 1.0
MAX_ACCELERATION = 5.0

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -999.0
MAX_LIMIT = 999.0
MAX_VELOCITY = 1.0
MAX_ACCELERATION = 5.0
BACKLASH = 0.0
SCALE = 1.0
FERROR = 0.050
MIN_FERROR = 0.010
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0.1
HOME_LATCH_VEL = 0.02
HOME_SEQUENCE = 1
P = 0
I = 0
D = 0
FF0 = 0
FF1 = 0
FF2 = 0
BIAS = 0
DEADBAND = 0
MAX_OUTPUT = 10.0

[AXIS_Y]
MIN_LIMIT = -999.0
MAX_LIMIT = 999.0
MAX_VELOCITY = 1.0
MAX_ACCELERATION = 5.0

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -999.0
MAX_LIMIT = 999.0
MAX_VELOCITY = 1.0
MAX_ACCELERATION = 5.0
